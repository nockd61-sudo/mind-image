<!-- ✅ 카카오 SDK -->
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<script>
/* ✅ 카카오 초기화 (여기 반드시 본인 키 넣기) */
Kakao.init('여기에_자바스크립트키');

/* ✅ 공유 함수 */
function shareKakao(title, description, imageUrl) {
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: title,
      description: description,
      imageUrl: imageUrl,
      link: {
        mobileWebUrl: window.location.href,
        webUrl: window.location.href,
      },
    },
    buttons: [
      {
        title: '결과 보러가기',
        link: {
          mobileWebUrl: window.location.href,
          webUrl: window.location.href,
        },
      },
    ],
  });
}
</script>
